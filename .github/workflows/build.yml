name: .NET
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore Stock/src/Stock.Service.API/Stock.Service.API.csproj
      - name: Build
        run: dotnet build Stock/src/Stock.Service.API/Stock.Service.API.csproj --no-restore --configuration Release
      - name: Test
        run: dotnet test Stock/tests/Stock.Service.Integration.Test/Stock.Service.Integration.Test.csproj --verbosity normal
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKERHUB_USERNAME }}'
          password: '${{ secrets.DOCKERHUB_PASSWORD }}'
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Stock/src/Stock.Service.API/Dockerfile
          push: true
          tags: 'goldena91/microservices:latest'